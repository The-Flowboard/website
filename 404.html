    <style>
        :root {
            --primary-deep: #171721;
            --primary-dark: #1f1f2e;
            --primary-mid: #2a2a3e;
            --accent-purple: #872B97;
            --accent-cyan: #ff7130;
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.8);
            --font-display: 'Sora', sans-serif;
            --font-body: 'Nunito Sans', sans-serif;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: var(--font-body);
            background: linear-gradient(135deg, var(--primary-deep) 0%, var(--primary-dark) 50%, var(--primary-mid) 100%);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(135, 43, 151, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(255, 113, 48, 0.15) 0%, transparent 50%);
            animation: gradient-shift 15s ease infinite;
            z-index: -1;
        }
        
        @keyframes gradient-shift {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(5%, -5%); }
        }
        
        .container {
            text-align: center;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 32px;
            padding: 4rem 3rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }
        
        h1 {
            font-family: var(--font-display);
            font-size: clamp(4rem, 10vw, 8rem);
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-purple) 0%, var(--accent-cyan) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
            line-height: 1;
        }
        
        h2 {
            font-family: var(--font-display);
            font-size: clamp(1.5rem, 3vw, 2rem);
            margin-bottom: 1rem;
        }
        
        p {
            font-size: 1.125rem;
            color: var(--text-secondary);
            margin-bottom: 2rem;
            line-height: 1.6;
        }
        
        .btn {
            display: inline-block;
            padding: 1rem 2.5rem;
            background: linear-gradient(135deg, var(--accent-purple) 0%, var(--accent-cyan) 100%);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-family: var(--font-display);
            font-weight: 600;
            font-size: 1.125rem;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(135, 43, 151, 0.4);
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(168, 85, 247, 0.45);
        }
        
        .links {
            margin-top: 2rem;
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .links a {
            color: var(--accent-cyan);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .links a:hover {
            color: var(--accent-purple);
        }
    </style>
