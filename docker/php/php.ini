; JMC Local Development PHP Configuration

; Error reporting — show all errors locally
display_errors = On
display_startup_errors = On
error_reporting = E_ALL
log_errors = On

; Timezone
date.timezone = America/Toronto

; Upload limits (match production)
upload_max_filesize = 10M
post_max_size = 12M

; Memory
memory_limit = 256M

; Max execution time
max_execution_time = 30

; Session
session.cookie_httponly = 1

; Disable expose_php header
expose_php = Off
