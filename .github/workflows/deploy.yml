name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    name: Test & Validate

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
          extensions: mysqli, gd, fileinfo
          tools: composer

      - name: Validate composer.json
        run: composer validate --strict

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --prefer-dist

      - name: PHP Syntax Check
        run: |
          echo "Checking PHP syntax for all PHP files..."
          find . -name "*.php" -not -path "./vendor/*" -not -path "./docker/*" -print0 | xargs -0 -n1 php -l

      - name: Check for security vulnerabilities
        run: |
          composer audit || echo "Audit check completed"

  deploy:
    needs: test
    runs-on: ubuntu-latest
    name: Deploy to Production Server
    environment:
      name: production
      url: https://joshimc.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
          extensions: mysqli, gd, fileinfo
          tools: composer

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --prefer-dist

      - name: Fix ownership before rsync
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: sudo chown -R ubuntu:ubuntu /var/www/html

      - name: Deploy via rsync
        uses: burnett01/rsync-deployments@6.0.0
        with:
          switches: >-
            -avzr --delete
            --exclude='.git'
            --exclude='.github'
            --exclude='.claude'
            --exclude='.env'
            --exclude='.env.docker'
            --exclude='vendor'
            --exclude='node_modules'
            --exclude='.DS_Store'
            --exclude='.vscode'
            --exclude='docker'
            --exclude='docker-compose.yml'
            --exclude='Makefile'
            --exclude='*.md'
            --exclude='database/'
            --exclude='docs/'
            --exclude='n8n/'
            --exclude='scripts/'
            --exclude='CLAUDE.md'
            --exclude='*.sh'
            --exclude='images/blog/'
          path: ./
          remote_path: /var/www/html/
          remote_host: ${{ secrets.DEPLOY_HOST }}
          remote_user: ${{ secrets.DEPLOY_USER }}
          remote_key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Install Composer on server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /var/www/html
            composer install --no-dev --optimize-autoloader
            echo "Composer install completed"

      - name: Set correct permissions
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            sudo chown -R www-data:www-data /var/www/html
            sudo find /var/www/html -type f -exec chmod 644 {} \;
            sudo find /var/www/html -type d -exec chmod 755 {} \;
            sudo chmod 775 /var/www/html/images/blog/
            echo "Permissions updated"

      - name: Clear PHP OPcache
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            sudo systemctl reload apache2 || sudo service apache2 reload
            echo "Apache reloaded"

      - name: Deployment success
        if: success()
        run: |
          echo "Deployment to production successful"
          echo "Website: https://joshimc.com"
          echo "Deployed at: $(date)"

      - name: Deployment failure
        if: failure()
        run: |
          echo "Deployment failed — check logs above"
