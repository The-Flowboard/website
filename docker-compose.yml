version: '3.8'

services:
  php:
    build: ./docker/php
    container_name: jmc_php
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./.env.docker:/var/www/html/.env:ro
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      APP_ENV: local

  mysql:
    image: mysql:8.0
    container_name: jmc_mysql
    command: --default-authentication-plugin=mysql_native_password
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root_dev_password
      MYSQL_DATABASE: jmc_website
      MYSQL_USER: jmc_user
      MYSQL_PASSWORD: local_dev_password
    volumes:
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "jmc_user", "-plocal_dev_password"]
      interval: 5s
      timeout: 5s
      retries: 15

volumes:
  mysql_data:
